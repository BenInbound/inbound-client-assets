<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schema Implementation Plan -- www.lis.no | Inbound</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@100..900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Inbound Brand Colors */
            --color-primary-500: #1f1d49;
            --color-primary-100: #c6c5e8;
            --color-accent-500: #ff0056;
            --color-accent-200: #ff99bb;
            --color-secondary-300: #92c9ce;
            --color-base-50: #fdfcfc;
            --color-base-100: #f8f8f4;
            --color-base-200: #f2f0ed;
            --color-base-300: #ece8e4;
            --color-base-400: #e6e0db;
            --color-base-500: #e0d9d3;
            --color-text-dark: #1a1818;
            --color-text-primary: #1f1d49;
            --color-white: #ffffff;

            /* Status colors */
            --color-found: #22c55e;
            --color-partial: #eab308;
            --color-missing: #ef4444;

            /* Priority colors */
            --color-priority-1: #ff0056;
            --color-priority-2: #1f1d49;
            --color-priority-3: #92c9ce;

            /* Typography and spacing */
            --font-family: 'Kumbh Sans', sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
            --card-padding: 32px;
            --content-max-width: 960px;
            --border-radius-card: 16px;
            --border-radius-tag: 4px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-family);
            background: var(--color-base-100);
            color: var(--color-text-primary);
            line-height: 1.6;
            font-size: 18px;
        }

        /* NAVIGATION */
        .site-nav {
            background: var(--color-primary-500);
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .site-nav-inner {
            max-width: var(--content-max-width);
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
        }

        .site-nav .nav-brand {
            font-family: var(--font-family);
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--color-accent-500);
            text-decoration: none;
        }

        .container {
            max-width: var(--content-max-width);
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* HEADER */
        .report-header { text-align: center; margin-bottom: 48px; }
        .report-header .brand { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--color-accent-500); margin-bottom: 8px; }
        .report-header .label { font-size: 14px; font-weight: 500; text-transform: uppercase; letter-spacing: 1.5px; color: var(--color-primary-100); margin-bottom: 12px; }
        .report-header h1 { font-size: 44px; font-weight: 500; line-height: 52px; letter-spacing: -0.5px; color: var(--color-text-primary); margin-bottom: 8px; }
        .report-header .meta { font-size: 14px; color: var(--color-base-500); }
        @media (max-width: 700px) { .report-header h1 { font-size: 32px; line-height: 40px; } }

        /* INTRO NOTE */
        .intro-note { background: var(--color-base-200); border-radius: 12px; padding: 20px; margin-bottom: 32px; font-size: 15px; color: var(--color-text-dark); opacity: 0.8; line-height: 1.6; }
        .intro-note strong { color: var(--color-text-primary); opacity: 1; }

        /* SUMMARY CARDS (top-level stats) */
        .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 40px; }
        @media (max-width: 700px) { .summary-grid { grid-template-columns: repeat(2, 1fr); } }
        .summary-card { background: var(--color-base-50); border-radius: var(--border-radius-card); padding: 24px 20px; text-align: center; }
        .summary-card .card-label { font-size: 14px; font-weight: 600; color: var(--color-primary-100); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .summary-card .card-value { font-size: 37px; font-weight: 500; line-height: 1.1; color: var(--color-accent-500); }
        .summary-card .card-note { font-size: 13px; color: var(--color-text-dark); opacity: 0.5; margin-top: 4px; }

        /* SECTIONS */
        .section { background: var(--color-base-50); border-radius: var(--border-radius-card); padding: var(--card-padding); margin-bottom: 24px; }
        .section h2 { font-size: 31px; font-weight: 500; line-height: 40px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid var(--color-base-300); }
        .section h3 { font-size: 20px; font-weight: 500; margin-top: 24px; margin-bottom: 8px; }
        .section h4 { font-size: 17px; font-weight: 600; margin-top: 20px; margin-bottom: 6px; }
        .section p { margin-bottom: 12px; color: var(--color-text-dark); }
        .section p.secondary { opacity: 0.6; font-size: 16px; }

        /* AUDIT TABLE (Section 1) */
        .audit-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 15px; }
        .audit-table thead th { text-align: left; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--color-primary-100); padding: 8px 12px; border-bottom: 2px solid var(--color-base-300); }
        .audit-table tbody td { padding: 12px; border-bottom: 1px solid var(--color-base-200); color: var(--color-text-dark); vertical-align: top; }
        .audit-table tbody tr:last-child td { border-bottom: none; }

        /* Status badges */
        .status { font-size: 12px; font-weight: 600; padding: 3px 8px; border-radius: var(--border-radius-tag); display: inline-block; text-transform: uppercase; letter-spacing: 0.3px; }
        .status--found { background: rgba(34, 197, 94, 0.15); color: #15803d; }
        .status--partial { background: rgba(234, 179, 8, 0.15); color: #a16207; }
        .status--missing { background: rgba(239, 68, 68, 0.15); color: #dc2626; }

        /* SCHEMA RECOMMENDATION CARDS (Section 2) */
        .schema-rec { background: var(--color-base-100); border-radius: 12px; padding: 24px; margin-bottom: 20px; border-left: 4px solid var(--color-base-400); }
        .schema-rec.priority-1 { border-left-color: var(--color-priority-1); }
        .schema-rec.priority-2 { border-left-color: var(--color-priority-2); }
        .schema-rec.priority-3 { border-left-color: var(--color-priority-3); }

        .schema-rec .rec-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
        .schema-rec .rec-title { font-size: 19px; font-weight: 600; color: var(--color-text-primary); }
        .schema-rec .rec-why { font-size: 15px; color: var(--color-text-dark); opacity: 0.7; margin-bottom: 12px; }
        .schema-rec .rec-detail { font-size: 14px; color: var(--color-text-dark); opacity: 0.6; margin-bottom: 4px; }

        /* Level tags */
        .level-tag { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: var(--border-radius-tag); display: inline-block; text-transform: uppercase; letter-spacing: 0.3px; }
        .level-tag--sitewide { background: var(--color-accent-200); color: var(--color-text-primary); }
        .level-tag--template { background: var(--color-primary-100); color: var(--color-text-primary); }
        .level-tag--module { background: var(--color-secondary-300); color: var(--color-text-primary); }
        .level-tag--oneoff { background: var(--color-base-400); color: var(--color-text-primary); }

        /* Priority tags */
        .priority-tag { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: var(--border-radius-tag); display: inline-block; text-transform: uppercase; letter-spacing: 0.3px; }
        .priority-tag--1 { background: var(--color-accent-500); color: var(--color-white); }
        .priority-tag--2 { background: var(--color-primary-500); color: var(--color-white); }
        .priority-tag--3 { background: var(--color-secondary-300); color: var(--color-text-primary); }

        /* CODE BLOCKS */
        .code-block { background: #1e1e2e; border-radius: 8px; padding: 20px; margin: 12px 0; overflow-x: auto; }
        .code-block pre { font-family: var(--font-mono); font-size: 13px; line-height: 1.5; color: #cdd6f4; white-space: pre; margin: 0; }
        .code-block .comment { color: #6c7086; }
        .code-block .key { color: #89b4fa; }
        .code-block .string { color: #a6e3a1; }
        .code-block .bracket { color: #f9e2af; }
        .code-label { font-size: 12px; font-weight: 600; color: var(--color-primary-100); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }

        /* IMPLEMENTATION TABLE (Section 3) */
        .impl-table { width: 100%; border-collapse: collapse; margin-top: 12px; margin-bottom: 8px; font-size: 15px; }
        .impl-table thead th { text-align: left; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--color-primary-100); padding: 8px 12px; border-bottom: 2px solid var(--color-base-300); }
        .impl-table tbody td { padding: 12px; border-bottom: 1px solid var(--color-base-200); color: var(--color-text-dark); vertical-align: top; }
        .impl-table tbody tr:last-child td { border-bottom: none; }
        .impl-table .task-name { font-weight: 500; color: var(--color-text-primary); }
        .impl-table .task-detail { font-size: 13px; opacity: 0.6; margin-top: 2px; }
        .impl-table .hours { font-weight: 600; white-space: nowrap; text-align: center; }
        .impl-table .hours-dev { color: var(--color-accent-500); }
        .impl-table .hours-content { color: var(--color-primary-500); }
        .subtotal-row td { font-weight: 600 !important; color: var(--color-text-primary) !important; border-top: 2px solid var(--color-base-300) !important; padding-top: 12px !important; }
        .grand-total-row td { font-weight: 700 !important; color: var(--color-accent-500) !important; border-top: 3px solid var(--color-primary-500) !important; padding-top: 16px !important; font-size: 16px; }

        /* NOTE BOX */
        .note-box { background: var(--color-base-200); border-radius: 12px; padding: 16px 20px; font-size: 15px; color: var(--color-text-dark); opacity: 0.8; margin-top: 16px; line-height: 1.6; }
        .note-box strong { color: var(--color-text-primary); opacity: 1; }

        /* LEVERAGE CALLOUT */
        .leverage-callout { background: linear-gradient(135deg, var(--color-primary-500) 0%, #2d2a6e 100%); border-radius: 12px; padding: 24px; margin: 20px 0; text-align: center; }
        .leverage-callout .callout-number { font-size: 48px; font-weight: 700; color: var(--color-accent-500); line-height: 1; }
        .leverage-callout .callout-label { font-size: 15px; color: rgba(255, 255, 255, 0.8); margin-top: 4px; }

        /* FOOTER */
        .report-footer { background: var(--color-primary-500); color: var(--color-white); text-align: center; padding: 32px; border-radius: var(--border-radius-card); margin-top: 40px; font-size: 14px; line-height: 1.6; }
        .report-footer .footer-brand { font-weight: 600; font-size: 16px; margin-bottom: 8px; }
        .report-footer p { opacity: 0.8; }
        .report-footer a { color: var(--color-accent-200); text-decoration: none; }
        .report-footer a:hover { text-decoration: underline; }

        @media print {
            .site-nav { display: none; }
            body { background: var(--color-base-100); }
            .container { padding: 20px; }
            .section, .summary-card { border: 1px solid var(--color-base-300); }
            .code-block { background: #f5f5f5; }
            .code-block pre { color: #333; }
        }
    </style>
</head>
<body>

    <!-- NAVIGATION -->
    <nav class="site-nav">
        <div class="site-nav-inner">
            <a href="#" class="nav-brand">Inbound</a>
        </div>
    </nav>

    <div class="container">
