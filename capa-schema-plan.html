<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Schema Implementation Plan -- capa.no | Inbound</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@100..900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Inbound Brand Colors */
            --color-primary-500: #1f1d49;
            --color-primary-100: #c6c5e8;
            --color-accent-500: #ff0056;
            --color-accent-200: #ff99bb;
            --color-secondary-300: #92c9ce;
            --color-base-50: #fdfcfc;
            --color-base-100: #f8f8f4;
            --color-base-200: #f2f0ed;
            --color-base-300: #ece8e4;
            --color-base-400: #e6e0db;
            --color-base-500: #e0d9d3;
            --color-text-dark: #1a1818;
            --color-text-primary: #1f1d49;
            --color-white: #ffffff;

            /* Status colors */
            --color-found: #22c55e;
            --color-partial: #eab308;
            --color-missing: #ef4444;

            /* Priority colors */
            --color-priority-1: #ff0056;
            --color-priority-2: #1f1d49;
            --color-priority-3: #92c9ce;

            /* Typography and spacing */
            --font-family: 'Kumbh Sans', sans-serif;
            --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
            --card-padding: 32px;
            --content-max-width: 960px;
            --border-radius-card: 16px;

        * { margin: 0; padding: 0; box-sizing: border-box; }
